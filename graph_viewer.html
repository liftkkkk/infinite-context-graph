<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entity Graph Viewer</title>
    <!-- Use CDN for simplicity -->
    <script src="https://unpkg.com/force-graph"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; display: flex; height: 100vh; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 250px;
        }
        #file-input {
            width: 100%;
        }
        #search-input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #graph-container {
            flex-grow: 1;
            background: #f8f9fa;
            position: relative;
        }
        #details-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: white;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
            z-index: 150; /* Higher than controls */
        }
        #details-panel.visible {
            transform: translateX(0);
        }
        .node-label {
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        h2 { margin-top: 0; color: #333; font-size: 1.4em; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .meta-info {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
            color: #999;
            line-height: 1;
        }
        .close-btn:hover { color: #333; }
        
        /* Markdown styles */
        #content-body { line-height: 1.6; color: #333; }
        #content-body h1, #content-body h2, #content-body h3 { margin-top: 1.5em; margin-bottom: 0.5em; }
        #content-body p { margin-bottom: 1em; }
        #content-body ul { padding-left: 20px; }
        #content-body img { max-width: 100%; height: auto; border-radius: 4px; }
        #content-body pre { background: #2d2d2d; color: #f8f8f2; padding: 15px; overflow-x: auto; border-radius: 4px; }
        #content-body code { background: #eee; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
        #content-body blockquote { border-left: 4px solid #ddd; padding-left: 15px; color: #666; margin: 1em 0; }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2em;
            color: #666;
            display: none;
            background: rgba(255,255,255,0.8);
            padding: 20px;
            border-radius: 8px;
        }
        
        .stats {
            font-size: 0.85em;
            color: #777;
            text-align: right;
        }
    </style>
</head>
<body>

<div id="controls">
    <h3>Entity Graph Viewer</h3>
    <input type="file" id="file-input" accept=".json" title="Select entity_graph.json">
    <input type="text" id="search-input" placeholder="Search nodes..." disabled>
    <div id="stats" class="stats"></div>
    <div style="font-size: 0.8em; color: #888; margin-top: 10px;">
        <p>Instructions:</p>
        <ul>
            <li>Load a JSON file</li>
            <li>Scroll to zoom</li>
            <li>Drag to pan</li>
            <li>Click node for details</li>
        </ul>
    </div>
</div>

<div id="graph-container"></div>

<div id="loading">Loading graph data...</div>

<div id="details-panel">
    <span class="close-btn" onclick="closePanel()">×</span>
    <h2 id="node-title">Select a Node</h2>
    <div class="meta-info" id="node-meta"></div>
    <div id="content-body"></div>
</div>

<script>
    // Initialize ForceGraph
    const Graph = ForceGraph()(document.getElementById('graph-container'));
    
    // DOM Elements
    const fileInput = document.getElementById('file-input');
    const searchInput = document.getElementById('search-input');
    const statsDiv = document.getElementById('stats');
    const detailsPanel = document.getElementById('details-panel');
    const nodeTitle = document.getElementById('node-title');
    const nodeMeta = document.getElementById('node-meta');
    const contentBody = document.getElementById('content-body');
    const loadingDiv = document.getElementById('loading');

    // State
    let graphData = { nodes: [], links: [] };

    // Configure Graph
    Graph
        .nodeId('id')
        .nodeLabel('id') // tooltip
        .nodeAutoColorBy('type')
        .nodeRelSize(6)
        .linkDirectionalArrowLength(3.5)
        .linkDirectionalArrowRelPos(1)
        .linkWidth(1.5)
        .linkColor(() => '#cccccc')
        .onNodeClick(handleNodeClick)
        .onLinkClick(handleLinkClick)
        .linkLabel(link => `Type: ${link.type}`)
        .linkCanvasObjectMode(() => 'after')
        .linkCanvasObject((link, ctx, globalScale) => {
            const label = link.type;
            const start = link.source;
            const end = link.target;
            const textPos = Object.assign(...['x', 'y'].map(c => ({
                [c]: start[c] + (end[c] - start[c]) / 2 // calc middle point
            })));
            const relLink = { x: end.x - start.x, y: end.y - start.y };
            const maxTextLength = Math.sqrt(Math.pow(relLink.x, 2) + Math.pow(relLink.y, 2)) - 8;
            let textAngle = Math.atan2(relLink.y, relLink.x);
            // maintain label vertical orientation for legibility
            if (textAngle > Math.PI / 2) textAngle = -(Math.PI - textAngle);
            if (textAngle < -Math.PI / 2) textAngle = -(-Math.PI - textAngle);

            const fontSize = 4; // font size
            ctx.font = `${fontSize}px Sans-Serif`;
            const textWidth = ctx.measureText(label).width;
            const bckgDimensions = [textWidth, fontSize].map(n => n + fontSize * 0.2); // some padding

            // Draw text background
            ctx.save();
            ctx.translate(textPos.x, textPos.y);
            ctx.rotate(textAngle);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillRect(-bckgDimensions[0] / 2, -bckgDimensions[1] / 2, ...bckgDimensions);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#666'; // text color
            ctx.fillText(label, 0, 0);
            ctx.restore();
        })
        .onBackgroundClick(() => {
             // Optional: close panel on background click?
             // closePanel();
        });

    // Handle File Input
    fileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        
        loadingDiv.style.display = 'block';
        searchInput.disabled = true;
        
        // Reset graph
        Graph.graphData({ nodes: [], links: [] });

        reader.onload = (e) => {
            try {
                const json = JSON.parse(e.target.result);
                
                // Validate basic structure
                if (!json.nodes || (!json.edges && !json.links)) {
                    throw new Error('Invalid JSON format. Expected "nodes" and "edges" arrays.');
                }

                // Prepare data
                // Map 'edges' to 'links' if needed
                const links = json.edges || json.links;
                
                // Deep clone to avoid mutating original if we kept it, 
                // but here we parse fresh each time so it's fine.
                // However, ForceGraph adds internal properties to objects, so be aware.
                
                graphData = {
                    nodes: json.nodes,
                    links: links
                };

                // Update UI
                statsDiv.textContent = `${graphData.nodes.length} nodes, ${graphData.links.length} edges`;
                searchInput.disabled = false;

                // Render
                Graph.graphData(graphData);
                
                // Adjust physics
                Graph.d3Force('charge').strength(-120);
                
                // Fit to view
                setTimeout(() => {
                    Graph.zoomToFit(400, 50); // padding 50px
                }, 800);

            } catch (err) {
                alert('Error loading file: ' + err.message);
                console.error(err);
            } finally {
                loadingDiv.style.display = 'none';
            }
        };

        reader.readAsText(file);
    });

    // Handle Search
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        
        // Update node rendering
        Graph.nodeColor(node => {
            // If no query, use the original color (assigned by autoColor or default)
            // Note: force-graph's autoColor populates 'color' property on nodes
            if (!query) return node.color; 
            
            const isMatch = node.id.toLowerCase().includes(query);
            return isMatch ? '#ff4400' : 'rgba(200, 200, 200, 0.2)';
        });
        
        // Update link rendering (dim links if searching)
        Graph.linkColor(link => {
            if (!query) return '#cccccc';
            
            const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
            const targetId = typeof link.target === 'object' ? link.target.id : link.target;
            
            const sourceMatch = sourceId.toLowerCase().includes(query);
            const targetMatch = targetId.toLowerCase().includes(query);
            
            return (sourceMatch || targetMatch) ? '#ff4400' : 'rgba(200, 200, 200, 0.1)';
        });

        // Zoom to first match
        if (query) {
            const firstMatch = graphData.nodes.find(n => n.id.toLowerCase().includes(query));
            if (firstMatch) {
                // Only zoom if we are not already close (optional optimization)
                Graph.centerAt(firstMatch.x, firstMatch.y, 1000);
                Graph.zoom(2, 2000);
            }
        }
    });

    function handleNodeClick(node) {
        showDetails(node, 'node');
        
        // Focus on node
        Graph.centerAt(node.x, node.y, 1000);
        Graph.zoom(2.5, 2000);
    }

    function handleLinkClick(link) {
        showDetails(link, 'link');
    }

    function showDetails(data, type) {
        // Show panel first
        detailsPanel.classList.add('visible');
        
        // Ensure panel is visible even if CSS transition fails
        detailsPanel.style.display = 'block';
        
        console.log('Showing details for:', type, data);

        if (type === 'node') {
            nodeTitle.textContent = data.id || 'Unknown Node';
            let metaHtml = `<div><strong>Type:</strong> <span style="background: #eee; padding: 2px 6px; border-radius: 4px;">${data.type || 'N/A'}</span></div>`;
            if (data.importance) metaHtml += `<div><strong>Importance:</strong> ${parseFloat(data.importance).toFixed(4)}</div>`;
            nodeMeta.innerHTML = metaHtml;
            
            // Safe Markdown parsing
            if (data.content) {
                try {
                    if (typeof marked !== 'undefined') {
                        // Support both marked() and marked.parse() depending on version loaded
                        const parse = marked.parse || marked;
                        contentBody.innerHTML = parse(data.content);
                    } else {
                        contentBody.innerText = data.content; // Fallback to plain text
                        console.warn('Marked library not loaded');
                    }
                } catch (e) {
                    console.error('Markdown parsing error:', e);
                    contentBody.innerText = data.content;
                }
            } else {
                contentBody.innerHTML = '<p><em>No content available.</em></p>';
            }
            
        } else if (type === 'link') {
            const sourceId = typeof data.source === 'object' ? data.source.id : data.source;
            const targetId = typeof data.target === 'object' ? data.target.id : data.target;
            
            nodeTitle.textContent = `Edge: ${data.type}`;
            let metaHtml = `
                <div><strong>Source:</strong> ${sourceId}</div>
                <div><strong>Target:</strong> ${targetId}</div>
                <div><strong>Type:</strong> ${data.type}</div>
            `;
            if (data.id) metaHtml = `<div><strong>ID:</strong> ${data.id}</div>` + metaHtml;
            
            nodeMeta.innerHTML = metaHtml;
            contentBody.innerHTML = '<p><em>Relationship details.</em></p>';
        }
    }

    function closePanel() {
        detailsPanel.classList.remove('visible');
        // Hide after transition
        setTimeout(() => {
             if (!detailsPanel.classList.contains('visible')) {
                 detailsPanel.style.display = 'none';
             }
        }, 300);
    }

    // Responsive resize
    window.addEventListener('resize', () => {
        if (Graph) {
            Graph.width(document.getElementById('graph-container').offsetWidth);
            Graph.height(document.getElementById('graph-container').offsetHeight);
        }
    });
</script>

</body>
</html>
